CDNAClone.gene= \
  chado-db-flybase-dmel, \
  bdgp-clone

SequenceFeature.sequenceOntologyTerm = chado-db-flybase-dmel, flybase-aberrations, flybase-allele-descriptions, flybase-allele-stubs, flybase-insertions, uniprot, drosdel-gff, long-oligo, miranda, *
#Allele.sequenceOntologyTerm = flybase-alleles, chado-db-flybase-dmel, *
Allele.symbol = chado-db-flybase-dmel, *
DOTerm.name = do, *

# 2026-06-03: drosophila-homology + flybase-aberrations create their own
# Ontology("Sequence Ontology") references before so loads (via inherited
# SequenceFeature -> SOTerm -> Ontology refs). Without explicit priority,
# the InterMine loader hits a field collision and the build fails unless
# integrated with -a so- resume. Pin so as winner; aberrations + homology
# fall in behind. See FLYMINE_PHASE1_5_CLOSEOUT_PHASE2_PLAN_2026_06_03.md §2.1.
SOTerm.ontology = so, flybase-aberrations, drosophila-homology, *
Ontology.name   = so, flybase-aberrations, drosophila-homology, *
Ontology.url    = so, flybase-aberrations, drosophila-homology, *

# 2026-06-04: the lean Allele-merging sources (flybase-allele-descriptions,
# flybase-allele-stubs) and the new FBti/FBtp sources inherit
# sequenceOntologyTerm via the SequenceFeature parent class even though they
# never explicitly set it. Rather than maintain a class-specific override on
# Allele, the SequenceFeature.sequenceOntologyTerm line above is extended to
# list all of them — chado-db-flybase-dmel still wins. See
# FLYMINE_PHASE2_FINDINGS §2.2 + builder cleanup-pass note 2026-06-04.

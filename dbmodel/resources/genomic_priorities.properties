SequenceFeature.sequenceOntologyTerm = chado-db-flybase-dmel, uniprot, flybase-aberrations, flybase-allele-descriptions, flybase-allele-stubs, flybase-transgenic-constructs, drosdel-gff, long-oligo, miranda, *
#Allele.sequenceOntologyTerm = flybase-alleles, chado-db-flybase-dmel, *
Allele.symbol = chado-db-flybase-dmel, *
DOTerm.name = do, *

# 2026-06-03: drosophila-homology + flybase-aberrations create their own
# Ontology("Sequence Ontology") references before so loads (via inherited
# SequenceFeature -> SOTerm -> Ontology refs). Without explicit priority,
# the InterMine loader hits a field collision and the build fails unless
# integrated with -a so- resume. Pin so as winner; aberrations + homology
# fall in behind. See FLYMINE_PHASE1_5_CLOSEOUT_PHASE2_PLAN_2026_06_03.md §2.1.
SOTerm.ontology = so, flybase-aberrations, drosophila-homology, *
Ontology.name   = so, flybase-aberrations, drosophila-homology, *
Ontology.url    = so, flybase-aberrations, drosophila-homology, *

# 2026-06-05: Allele in this merged genomic model does NOT extend
# SequenceFeature (only SequenceCollection per flymine-global_additions.xml;
# the flybase-alleles_additions.xml SequenceFeature declaration loses out
# in the merge). So Allele.sequenceOntologyTerm needs its OWN priority
# entry; falling back to SequenceFeature.* alone leaves Allele orphan and
# the loader fails on Allele-on-Allele field collisions. The "* fallback"
# alone is not enough — explicit ordering of competing sources is required.
# See FLYMINE_PHASE2_ROUND3_CLOSEOUT_HANDOFF_2026_06_05.md §4 (lessons
# learned: priority inheritance is by-class, single-entry-per-field).
Allele.sequenceOntologyTerm = chado-db-flybase-dmel, flybase-aberrations, flybase-allele-descriptions, flybase-allele-stubs, *

  chado-db-flybase-dpse, \
  chado-db-flybase-others,\
  wormbase-identifiers, \
  mgi-identifiers, \
  rgd-identifiers, \
  uniprot, \
  flyreg, \
  hgnc, \
  *

Protein.primaryIdentifier = \
